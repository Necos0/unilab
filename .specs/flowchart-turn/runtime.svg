<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" width="640">
  <defs>
    <marker id="arr-rt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arr-rt-loop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8860b"/>
    </marker>
    <style>
      .box { fill: #f5f5fa; stroke: #333; stroke-width: 1.5; }
      .start-box { fill: #fff8dc; stroke: #c5a017; stroke-width: 1.5; }
      .lab { font-family: monospace; font-size: 12px; fill: #222; }
      .lab-s { font-family: monospace; font-size: 10px; fill: #b8860b; }
      .ed { fill: none; stroke: #444; stroke-width: 1.5; }
      .ed-loop { fill: none; stroke: #b8860b; stroke-width: 1.5; stroke-dasharray: 5 3; }
    </style>
  </defs>

  <rect class="start-box" x="180" y="20" width="240" height="40" rx="6"/>
  <text class="lab" x="300" y="45" text-anchor="middle">Play 押下 (startExecution)</text>
  <line class="ed" x1="300" y1="60" x2="300" y2="84" marker-end="url(#arr-rt)"/>

  <rect class="box" x="180" y="86" width="240" height="40" rx="6"/>
  <text class="lab" x="300" y="111" text-anchor="middle">scheduleNodePhase(nodeId)</text>
  <line class="ed" x1="300" y1="126" x2="300" y2="150" marker-end="url(#arr-rt)"/>

  <rect class="box" x="180" y="152" width="240" height="40" rx="6"/>
  <text class="lab" x="300" y="177" text-anchor="middle">カード効果を適用</text>
  <line class="ed" x1="300" y1="192" x2="300" y2="216" marker-end="url(#arr-rt)"/>

  <rect class="box" x="180" y="218" width="240" height="40" rx="6"/>
  <text class="lab" x="300" y="243" text-anchor="middle">selectNextEdge(nodeId)</text>
  <line class="ed" x1="300" y1="258" x2="300" y2="282" marker-end="url(#arr-rt)"/>
  <text class="lab-s" x="430" y="270">edgesBySource から</text>
  <text class="lab-s" x="430" y="284">方向不問で次エッジ取得</text>

  <rect class="box" x="180" y="284" width="240" height="40" rx="6"/>
  <text class="lab" x="300" y="309" text-anchor="middle">scheduleEdgePhase(edge)</text>

  <path class="ed-loop" d="M 420 304 L 540 304 L 540 106 L 420 106" marker-end="url(#arr-rt-loop)"/>
  <text class="lab-s" x="555" y="210" text-anchor="middle">次ノードへ</text>
  <text class="lab-s" x="555" y="224" text-anchor="middle">(ループ継続)</text>
</svg>
