<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720">
  <defs>
    <marker id="arr-flow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <style>
      .actor { fill: #fff5cc; stroke: #c5a017; stroke-width: 1.5; }
      .ui { fill: #e3f2fd; stroke: #1976d2; stroke-width: 1.5; }
      .store { fill: #e8f5e9; stroke: #388e3c; stroke-width: 1.5; }
      .css { fill: #f5f5fa; stroke: #333; stroke-width: 1.5; }
      .lab { font-family: monospace; font-size: 12px; fill: #222; }
      .lab-b { font-family: monospace; font-size: 12px; fill: #222; font-weight: bold; }
      .lab-s { font-family: monospace; font-size: 10px; fill: #555; }
      .ed { fill: none; stroke: #444; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="actor" x="40" y="20" width="160" height="40" rx="6"/>
  <text class="lab-b" x="120" y="44" text-anchor="middle">プレイヤー</text>
  <text class="lab-s" x="120" y="58" text-anchor="middle">(ZoomButton を押す)</text>

  <line class="ed" x1="200" y1="40" x2="240" y2="40" marker-end="url(#arr-flow)"/>

  <rect class="ui" x="240" y="20" width="180" height="40" rx="6"/>
  <text class="lab-b" x="330" y="44" text-anchor="middle">ZoomButton</text>
  <text class="lab-s" x="330" y="58" text-anchor="middle">onClick={toggleExpand}</text>

  <line class="ed" x1="420" y1="40" x2="460" y2="40" marker-end="url(#arr-flow)"/>

  <rect class="store" x="460" y="20" width="220" height="40" rx="6"/>
  <text class="lab-b" x="570" y="44" text-anchor="middle">battleStore.toggleExpand</text>
  <text class="lab-s" x="570" y="58" text-anchor="middle">set isExpanded / isTransitioning</text>

  <line class="ed" x1="570" y1="60" x2="570" y2="100" marker-end="url(#arr-flow)"/>

  <rect class="ui" x="380" y="100" width="380" height="60" rx="6"/>
  <text class="lab-b" x="570" y="120" text-anchor="middle">BattleScreen re-render</text>
  <text class="lab-s" x="570" y="136" text-anchor="middle">rootClassName に styles.expanded / .transitioning 付与</text>
  <text class="lab-s" x="570" y="151" text-anchor="middle">(JSX 構造は無変更、.roboPanel は常に存在)</text>

  <line class="ed" x1="570" y1="160" x2="570" y2="195" marker-end="url(#arr-flow)"/>

  <rect class="css" x="380" y="196" width="380" height="80" rx="6"/>
  <text class="lab-b" x="570" y="216" text-anchor="middle">CSS transition (既存 250ms)</text>
  <text class="lab-s" x="570" y="232" text-anchor="middle">.enemyArea: flex-grow 45 → 0</text>
  <text class="lab-s" x="570" y="246" text-anchor="middle">.flowchartArea: flex-grow 35 → 80</text>
  <text class="lab-s" x="570" y="260" text-anchor="middle">.roboPanel: flex-grow 55 (不変、自動で 100% へ)</text>

  <line class="ed" x1="570" y1="276" x2="570" y2="310" marker-end="url(#arr-flow)"/>

  <rect class="ui" x="380" y="310" width="380" height="40" rx="6"/>
  <text class="lab-b" x="570" y="328" text-anchor="middle">紫枠 (.roboPanel::before) も自動拡大</text>
  <text class="lab-s" x="570" y="342" text-anchor="middle">inset: 0 で .roboPanel に追従、新規 CSS なし</text>

  <rect class="ui" x="30" y="120" width="320" height="180" rx="6" fill="#f9f9f9" stroke="#999" stroke-dasharray="3 3"/>
  <text class="lab-b" x="190" y="140" text-anchor="middle" fill="#555">既存ロジックへの影響なし</text>
  <text class="lab-s" x="50" y="162" fill="#555">• React Flow ResizeObserver / refit</text>
  <text class="lab-s" x="50" y="180" fill="#555">  (.flowchartArea サイズ変化を検知して</text>
  <text class="lab-s" x="50" y="194" fill="#555">  fitBounds / setViewport を呼ぶ、既存と同じ)</text>
  <text class="lab-s" x="50" y="218" fill="#555">• dnd-kit ヒットテスト</text>
  <text class="lab-s" x="50" y="232" fill="#555">  (pointer-events: none の紫枠が干渉せず)</text>
  <text class="lab-s" x="50" y="256" fill="#555">• battleStore.startExecution の演出</text>
  <text class="lab-s" x="50" y="270" fill="#555">  (実行・通過軌跡・カード光彩などすべて</text>
  <text class="lab-s" x="50" y="284" fill="#555">  従来どおり)</text>
</svg>
